name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: admin
          RABBITMQ_DEFAULT_VHOST: rabbitmq-host

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup :contentReference[oaicite:0]{index=0}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Create Backend Environment File
        run: |
          echo "PORT=3010" >> backend/.env
          echo "MONGO_URI=mongodb://admin:admin@localhost:27017/assessment?authSource=admin" >> backend/.env
          echo "MR_URL=amqp://admin:admin@localhost:5672/rabbitmq-host" >> backend/.env

      - name: Wait for MongoDB
        run: sleep 10

      - name: Wait for RabbitMQ
        run: sleep 15

      # - name: Run Backend Tests
      #   working-directory: backend
      #   run: npm test --if-present

      - name: Build Backend
        working-directory: backend
        run: npm run build --if-present

      - name: Build Frontend
        working-directory: frontend
        run: npm run build
